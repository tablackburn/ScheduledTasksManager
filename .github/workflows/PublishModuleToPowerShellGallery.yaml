name: Publish Module to PowerShell Gallery

on:
  push:
    branches:
      - main
    paths:
      - 'ScheduledTasksManager/ScheduledTasksManager.psd1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Publish Module
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get Module Version
        id: version
        run: |
          $manifest = Import-PowerShellDataFile -Path ./ScheduledTasksManager/ScheduledTasksManager.psd1
          $version = $manifest.ModuleVersion
          Write-Host "Module version: $version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Check if Release Exists
        id: check_release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Bootstrap
        if: steps.check_release.outputs.exists == 'false'
        run: ./build.ps1 -Task 'Init' -Bootstrap

      - name: Check if Version Exists in PSGallery
        id: check_psgallery
        if: steps.check_release.outputs.exists == 'false'
        run: |
          Import-Module BuildHelpers
          Set-BuildEnvironment -Force
          [version]$githubVersion = Get-Metadata -Path $env:BHPSModuleManifest -PropertyName 'ModuleVersion' -ErrorAction 'Stop'
          $moduleSplat = @{
              Repository      = 'PSGallery'
              Name            = $env:BHProjectName
              RequiredVersion = $githubVersion
              AllowPrerelease = $True
              ErrorAction     = 'SilentlyContinue'
          }
          if (Find-Module @moduleSplat) {
              $inGallery = $True
          }
          else {
              $inGallery = $False
          }
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "IN_GALLERY=$inGallery" -Confirm:$False -Encoding 'UTF8'

      - name: Publish to PSGallery
        if: steps.check_release.outputs.exists == 'false' && steps.check_psgallery.outputs.IN_GALLERY == 'False'
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: ./build.ps1 -Task 'Publish' -Bootstrap

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $version = $env:VERSION

          # Build release notes from this version's CHANGELOG.md section so the release
          # body carries only the curated, user-facing entries (not the full PR list that
          # --generate-notes produces, which is dominated by bot/CI/chore PRs).
          $headerPattern = '^##\s+\[' + [regex]::Escape($version) + '\]'
          $capturing = $false
          $captured = [System.Collections.Generic.List[string]]::new()
          foreach ($line in (Get-Content -LiteralPath './CHANGELOG.md')) {
              if (-not $capturing) {
                  if ($line -match $headerPattern) { $capturing = $true }
                  continue
              }
              if ($line -match '^##\s+\[') { break }   # next version header ends the section
              $captured.Add($line)
          }
          $body = ($captured -join "`n").Trim()

          if ([string]::IsNullOrWhiteSpace($body)) {
              Write-Host "::warning::No CHANGELOG.md section found for $version; falling back to auto-generated notes."
              gh release create "v$version" --title "v$version" --generate-notes
          }
          else {
              # Append a compare link against the most recent existing tag. The v$version
              # tag does not exist yet (this step creates it), so the latest tag is the
              # previous release.
              $previousTag = git tag --list 'v*' --sort=-version:refname | Select-Object -First 1
              if ($previousTag) {
                  $body += "`n`n**Full Changelog**: https://github.com/${env:REPOSITORY}/compare/$previousTag...v$version"
              }
              Set-Content -LiteralPath './release-notes.md' -Value $body -Encoding utf8
              gh release create "v$version" --title "v$version" --notes-file './release-notes.md'
          }
